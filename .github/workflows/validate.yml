name: Validate workflows

on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate every .ircbot and build the index
        run: python3 tools/build_index.py
      - name: Show index changes (informational)
        run: git --no-pager diff --stat || true
