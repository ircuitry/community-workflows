name: Rebuild index

on:
  push:
    branches: [main]
    paths:
      - 'workflows/**'
      - 'tools/build_index.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Rebuild index.json
        run: python3 tools/build_index.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet index.json; then
            git config user.name "ircuitry-bot"
            git config user.email "actions@github.com"
            git add index.json
            git commit -m "chore: rebuild index.json"
            git push
          else
            echo "index.json already current"
          fi
